server:
  port: 8080

spring:
  application:
    name: orderflow-monolith

  datasource:
      #jdbc url points to out  local docker postgres
    url: jdbc:postgresql://localhost:5432/monolith
    username: orderflow
    password: orderflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' = Hibernate generates DDL from JPA entities and applies it on startup.
      # Great for dev. NEVER use in production — for prod, use Flyway/Liquibase migrations.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


logging:
  level:
    com.orderflow: INFO
    org.hibernate.SQL: INFO