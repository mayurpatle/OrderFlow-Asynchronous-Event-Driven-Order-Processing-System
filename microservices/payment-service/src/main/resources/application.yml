# payment-service runs on port 8083.
# Port plan so far:
#   8080 - monolith
#   8081 - order-service
#   8082 - inventory-service
#   8083 - payment-service  (this one)
#   8085 - notification-service

server:
  port: 8083

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: orderflow
    password: orderflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:29092

logging:
  level:
    com.orderflow: INFO
    org.apache.kafka: WARN
