# order-service runs on port 8081 (monolith is on 8080)
# Important: in production each service is its own container with its own port mapping.
# Locally we differentiate via ports so we can run monolith + microservices side by side.

server:
  port: 8081

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: orderflow
    password: orderflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

    # Kafka configuration.
    # 'localhost:29092' is the EXTERNAL listener we configured in Session 3.
    # Apps running on your laptop use 29092; apps running inside Docker
    # would use kafka:9092.
    kafka:
      bootstrap-servers: localhost:29092



logging:
  level:
    com.orderflow: INFO


