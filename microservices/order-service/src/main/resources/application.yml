# order-service runs on port 8081 (monolith is on 8080)
# Important: in production each service is its own container with its own port mapping.
# Locally we differentiate via ports so we can run monolith + microservices side by side.

server:
  port: 8081

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: orderflow
    password: orderflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    com.orderflow: INFO


