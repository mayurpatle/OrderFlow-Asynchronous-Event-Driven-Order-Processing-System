# shipping-service runs on port 8084.
# Port plan:
#   8080 - monolith
#   8081 - order-service
#   8082 - inventory-service
#   8083 - payment-service
#   8084 - shipping-service  (this one)
#   8085 - notification-service

server:
  port: 8084

spring:
  application:
    name: shipping-service

  datasource:
    url: jdbc:postgresql://localhost:5432/shipping
    username: orderflow
    password: orderflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:29092

logging:
  level:
    com.orderflow: INFO
    org.apache.kafka: WARN