services:
  postgres:
    image: postgres:16-alpine
    container_name: orderflow-postgres
    ports:
    - "5432:5432"
    environment:
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow
      POSTGRES_DB: monolith
    volumes:
      - postgres-data:/var/lob/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # ← ADD THIS post gres  init  script to initalize DB  
    networks:
      - orderflow

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: orderflow-kafka
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"    # internal communication between containers
      - "29092:29092"  # external — your laptop connects here
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'

      # Two listeners: one for inside the Docker network (kafka:9092)
      # and one for outside (localhost:29092). This dual setup is essential
      # for local dev — your apps running on your laptop will use 29092,
      # but inside Docker containers they'd use 9092.
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      # KRaft mode (no Zookeeper)
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'

      # Single-node settings (production would have replication factor 3)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'  # we'll create topics explicitly

      # KRaft cluster identity
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qg'

    networks:
      - orderflow

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: orderflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: orderflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - orderflow


networks:
  orderflow:
    name: orderflow
    driver: bridge

volumes:
  postgres-data:
  kafka-data:




